<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Caesar Cipher</title>
    <style>
        body { 
            background-color: #2c241e;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            display: flex; justify-content: center; padding: 50px; font-family: 'Times New Roman', serif;
        }
        .scroll { 
            background: #f4e4bc; /* Parchment color */
            padding: 40px; border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(139, 69, 19, 0.2);
            width: 100%; max-width: 500px; border: 15px solid #8b4513;
            border-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png') 30 round;
        }
        h1 { text-align: center; color: #5d0000; text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid #5d0000; }
        label { font-weight: bold; color: #5d0000; display: block; margin-top: 15px; }
        
        textarea, select, input { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #8b4513; 
            background: rgba(255,255,255,0.5); font-family: 'Times New Roman', serif; font-size: 1.1rem;
        }
        
        .mode-container { display: flex; gap: 10px; margin-bottom: 10px; }
        .mode-btn { 
            flex: 1; padding: 10px; cursor: pointer; border: 2px solid #5d0000; 
            background: none; color: #5d0000; font-weight: bold; transition: 0.3s;
        }
        .mode-btn.active { background: #5d0000; color: #f4e4bc; }

        .output-box { 
            background: rgba(0,0,0,0.05); padding: 20px; border: 1px dashed #8b4513; 
            min-height: 60px; font-style: italic; font-size: 1.3rem; color: #2c241e;
        }
    </style>
</head>
<body>

<div class="scroll">
    <h1>Veni Vidi Vici</h1>
    
    <div class="mode-container">
        <button id="encBtn" class="mode-btn active" onclick="setMode('encode')">ENCODE</button>
        <button id="decBtn" class="mode-btn" onclick="setMode('decode')">DECODE</button>
    </div>

    <label>Secret Message:</label>
    <textarea id="message" placeholder="Enter Latin or English text..."></textarea>
    
    <label>Key (Shift):</label>
    <input type="number" id="shift" value="3" min="1" max="25">
    
    <label>Result:</label>
    <div id="result" class="output-box">...</div>
</div>

<script>
    let mode = 'encode';
    const msgInput = document.getElementById('message');
    const shiftInput = document.getElementById('shift');
    const resultDiv = document.getElementById('result');

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('encBtn').classList.toggle('active', mode === 'encode');
        document.getElementById('decBtn').classList.toggle('active', mode === 'decode');
        update();
    }

    const caesarCipher = (str, shift) => {
        if (mode === 'decode') shift = (26 - (shift % 26));
        return str.replace(/[a-z]/gi, (char) => {
            const start = char <= 'Z' ? 65 : 97;
            return String.fromCharCode(((char.charCodeAt(0) - start + shift) % 26 + 26) % 26 + start);
        });
    };

    const update = () => {
        const shift = parseInt(shiftInput.value) || 0;
        resultDiv.innerText = caesarCipher(msgInput.value, shift) || "...";
    };

    msgInput.addEventListener('input', update);
    shiftInput.addEventListener('input', update);
</script>

</body>
</html>
