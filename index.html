<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar's Royal Cipher</title>
    <style>
        body { 
            background-color: #2c241e;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            font-family: 'Times New Roman', serif;
        }
        .scroll { 
            background: #f4e4bc; padding: 30px; border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7); width: 90%; max-width: 450px;
            border: 12px solid #8b4513; position: relative;
        }
        h1 { text-align: center; color: #5d0000; text-transform: uppercase; letter-spacing: 3px; margin-top: 0; }
        
        /* THE ROMAN WHEEL */
        .wheel-container { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
        .dial-wrapper { position: relative; width: 180px; height: 180px; }
        
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #d4d4d4, #a0a0a0);
            border: 6px solid #5d0000; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        
        .indicator {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 10px solid transparent;
            border-right: 10px solid transparent; border-top: 20px solid #5d0000; z-index: 10;
        }

        .center-mark { font-size: 2rem; font-weight: bold; color: #5d0000; pointer-events: none; }
        
        /* Controls */
        .mode-container { display: flex; gap: 5px; margin-bottom: 15px; }
        .mode-btn { 
            flex: 1; padding: 8px; cursor: pointer; border: 2px solid #5d0000; 
            background: none; color: #5d0000; font-weight: bold;
        }
        .mode-btn.active { background: #5d0000; color: #f4e4bc; }

        textarea { 
            width: 100%; height: 80px; padding: 10px; border: 1px solid #8b4513; 
            background: rgba(255,255,255,0.4); box-sizing: border-box; font-size: 1.1rem;
        }
        .output-box { 
            background: rgba(0,0,0,0.07); padding: 15px; border: 1px dashed #8b4513; 
            min-height: 50px; font-style: italic; color: #2c241e; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="scroll">
    <h1>Veni Vidi Vici</h1>
    
    <div class="mode-container">
        <button id="encBtn" class="mode-btn active" onclick="setMode('encode')">ENCODE</button>
        <button id="decBtn" class="mode-btn" onclick="setMode('decode')">DECODE</button>
    </div>

    <textarea id="message" placeholder="Enter your message..."></textarea>
    
    <div class="wheel-container">
        <label style="color:#5d0000; font-weight:bold; margin-bottom: 10px;">ROTATE THE DIAL</label>
        <div class="dial-wrapper">
            <div class="indicator"></div>
            <div id="wheel" onclick="rotateWheel()">
                <div class="center-mark" id="romanVal">III</div>
            </div>
        </div>
    </div>
    
    <div id="result" class="output-box">Your secret awaits...</div>
</div>

<script>
    let mode = 'encode';
    let currentShift = 3;
    const romanNumerals = ["N", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII", "XIII", "XIV", "XV", "XVI", "XVII", "XVIII", "XIX", "XX", "XXI", "XXII", "XXIII", "XXIV", "XXV"];

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('encBtn').classList.toggle('active', mode === 'encode');
        document.getElementById('decBtn').classList.toggle('active', mode === 'decode');
        update();
    }

    function rotateWheel() {
        currentShift = (currentShift + 1) % 26;
        const rotation = currentShift * (360 / 26);
        document.getElementById('wheel').style.transform = `rotate(-${rotation}deg)`;
        document.getElementById('romanVal').innerText = romanNumerals[currentShift];
        update();
    }

    const caesarCipher = (str, shift) => {
        if (mode === 'decode') shift = (26 - (shift % 26)) % 26;
        return str.replace(/[a-z]/gi, (char) => {
            const start = char <= 'Z' ? 65 : 97;
            return String.fromCharCode(((char.charCodeAt(0) - start + shift) % 26 + 26) % 26 + start);
        });
    };

    function update() {
        const text = document.getElementById('message').value;
        document.getElementById('result').innerText = caesarCipher(text, currentShift) || "Your secret awaits...";
    }

    document.getElementById('message').addEventListener('input', update);
    // Initial rotation
    document.getElementById('wheel').style.transform = `rotate(-${3 * (360/26)}deg)`;
</script>

</body>
</html>
